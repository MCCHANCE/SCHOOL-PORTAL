<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Union Secondary School Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body {
        background: linear-gradient(135deg, #0d6efd, #198754);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .login-card {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
        padding: 40px;
        color: white;
        animation: fadeIn 1s;
      }
      .form-control,
      .form-select {
        border-radius: 12px;
        padding: 12px;
      }
      .form-control:focus {
        box-shadow: none;
        border-color: #ffc107;
      }
      .logo {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: white;
        color: #0d6efd;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: auto;
        font-size: 40px;
        margin-bottom: 20px;
      }
      .btn-login {
        width: 100%;
        padding: 12px;
        border-radius: 30px;
        font-weight: 600;
      }
      .login-footer {
        text-align: center;
        margin-top: 20px;
      }
      .login-footer a {
        color: #fff;
        text-decoration: none;
      }
      .login-footer a:hover {
        color: #ffc107;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-5">
          <div class="login-card">
            <div class="logo">
              <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h2 class="text-center text-white mb-4">
              Union Secondary School School Portal
            </h2>
            <p class="text-center">Student & Staff Login</p>
            <form>
              <div class="mb-3">
                <label class="form-label"> Login As </label>
                <select class="form-select">
                  <option>Student</option>
                  <option>Administrator</option>
                  <option>Staff</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label"> Username </label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-person-fill"></i>
                  </span>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Enter Username"
                  />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label"> Password </label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-lock-fill"></i>
                  </span>
                  <input
                    type="password"
                    class="form-control"
                    placeholder="Enter Password"
                  />
                  <button
                    class="btn btn-light"
                    type="button"
                    onclick="togglePassword()"
                  >
                    <i class="bi bi-eye" id="eyeIcon"></i>
                  </button>
                </div>
              </div>
              <div class="d-flex justify-content-between mb-4">
                <div>
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="remember"
                  />
                  <label class="form-check-label" for="remember">
                    Remember Me
                  </label>
                </div>
                <a href="#"> Forgot Password? </a>
              </div>
              <button
                type="button"
                class="btn btn-warning btn-login"
                onclick="window.location.href='dashboard.html'" >
                <i class="bi bi-box-arrow-in-right"></i>
                Login
              </button>
            </form>
            <hr class="border-light" />
            <div class="text-center">
              <!-- <a href="payment.html" class="btn btn-success me-2">
                <i class="bi bi-credit-card"></i>
                Pay Fees
              </a> -->
              <a href="index.html" class="btn btn-outline-light">
                <i class="bi bi-house-fill"></i>
                Home
              </a>
            </div>
            <div class="login-footer">
              <p class="mt-4">© 2026 Union Secondary School Portal</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      function togglePassword() {
        let password = document.querySelector('input[type="password"]');
        let eye = document.getElementById("eyeIcon");
        if (password.type === "password") {
          password.type = "text";
          eye.classList.remove("bi-eye");
          eye.classList.add("bi-eye-slash");
        } else {
          password.type = "password";
          eye.classList.remove("bi-eye-slash");
          eye.classList.add("bi-eye");
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
